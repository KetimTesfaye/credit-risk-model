version: '3.8'

services:
  risk_api_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bati_credit_risk_gateway
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./mlflow.db:/app/mlflow.db
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    restart: always